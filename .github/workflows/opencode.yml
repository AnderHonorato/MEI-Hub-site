name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        with:
          model: deepseek/deepseek-v4-pro
          prompt: |
            Projeto: MEI no Controle — SaaS full-stack Node.js vanilla (sem dependências externas).
            Stack: http nativo, JSON file database, vanilla JS SPA, CSS puro, testes node:test.
            Siga as convenções definidas em AGENTS.md e opencode.json.
            Analise o contexto do comentário e execute a tarefa solicitada.
