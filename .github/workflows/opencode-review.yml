name: opencode-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: anomalyco/opencode/github@latest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: deepseek/deepseek-v4-pro
          use_github_token: true
          prompt: |
            Projeto: MEI no Controle — SaaS Node.js vanilla zero-dependência (http nativo, JSON file DB, vanilla JS).
            Revise este pull request seguindo as convenções em AGENTS.md:
            - Verifique problemas de qualidade de código
            - Procure por potenciais bugs
            - Sugira melhorias alinhadas às convenções do projeto
